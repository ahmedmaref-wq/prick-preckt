<!DOCTYPE  html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Prik Pracker – The Real One</title>
<style>
    :root{
  --bg: #0f1724;
  --card: #000000;
  --accent: #1f46d3;
  --accent-2: hsl(250, 81%, 23%);
  --muted: #0bf641;
  --glass: rgb(1, 53, 124);
}

body{
  background: linear-gradient(180deg,var(--bg), #09285d);
  color: #e6eef8;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

.wrap{
  max-width:1100px;
  width:100%;
  display:grid;
  grid-template-columns:1fr 360px;
  background:linear-gradient(180deg, rgba(144, 8, 8, 0.02), rgba(138, 14, 14, 0.01));
    border-radius:16px;
    padding:20px;
    box-shadow:0 8px 40px rgba(23, 31, 143, 0.6);
}

.panel{
    background:var(--card);
    padding:20px;
    border-radius:12px;
}

header{
    display:flex;
    gap:16px;
    margin-bottom:16px;
}
.logo{
  width:60px;
  height:60px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:16px;
  display:grid;
  place-items:center;
  font-size:28px;
  font-weight:900;
}
h1{
  font-size:28px;
  margin-top:20px;
}

p{
  color:var(--muted);
  font-size:14px;
}

#gameCanvas{
  width:100%;
  max-width:800px;
  height:400px;
  background:#071526;
  border-radius:12px;
  display:block;
  box-shadow:0 0 20px rgba(160,151,186,0.5);
}
.control{
  gap: 15px ;
   display:flex;
    flex-direction: column;
  }

  .row{
    display: flex;
    gap: 10px;
    align-items: center;
  }

  label{
    min-width: 120px;
    font-size: 14px;
    color: var(--muted);
  }

  input[type=range], input[type=number]{
    flex: 1;
  }
  input[type=range], input[type=number]{flex:1}
  

.btn{
  padding: 12px 16px;
  border: none;
  border-radius : 10px;
  cursor:pointer;
  font-weight : 600;
}
.btn-primary{
  background: linear-gradient(90deg,var(--accent),var(--accent-2));
  color: #040007;
}

.stats{
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin: 12px 0;
}
.stat{
  background: var(--glass);
  padding: 12px;
  border-radius: 10px;
  min-width: 100px;
  text-align: center;
}
.co{
  font-size: 13px;
  color: var(--muted);
}
.big{
  font-size: 20px;
  font-weight: 800;
}
#message{
  padding: 12px;
  border-radius: 8px;
   background: rgba(144, 8, 8, 0.02);
   min-height: 50px;
   text-align: center;
   font-size: 600;
}



.btn-ghost{
  background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--muted)
}

  </style>
</head>

<body>
<div class="wrap">
  <div class="panel">
    <header>
      <div class="logo">PP</div>
      <div>
        <h1>Prik Pracker</h1>
        <p style="color:var(--muted);font-size:14px">
          Destroy all the prick
        </p>
      </div>
    </header>

    <canvas id="gameCanvas"></canvas>
  </div>

  <aside class="panel">
    <div class="control">

      <div class="row">
        <label for="prickRows">Prick Rows</label>
        <input id="prickRows" type="range" min="2" max="8" value="5">
      </div>
 <div class="row">
        <label for="ballspeed">ball speed</label>
        <input id="ballspeed" type="range" min="2" max="8" value="5">
      </div>

      <div style="display:flex;gap:10px;margin:20px 0">
    <button id="startBtn" class="btn btn-primary">Start Game</button>
    <button id="resetBtn" class="btn btn-ghost">Reset</button>
</div>

<div class="stats">
    <div class="stat">
        <div style="font-size:13px;color:var(--muted)">Lives</div>
        <div id="lives" class="big">3</div>
    </div>
     <div class="stat">
        <div style="font-size:13px;color:var(--muted)">Pricks Left</div>
        <div id="left" class="big">0</div>
    </div>
     <div class="stat">
        <div style="font-size:13px;color:var(--muted)">score</div>
        <div id="score" class="big">0</div>
    </div>
</div>
<div id="message"></div>
<script>
    (() => {
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const livesEl = document.getElementById('lives');
const scoreEl = document.getElementById('score');
const leftEl = document.getElementById('left');
const messageEl = document.getElementById('message');
canvas.width= 800
canvas.height=400



const PADDLE_WIDTH = 100, PADDLE_HEIGHT = 12;
const BALL_RADIUS = 8;
const PRICK_WIDTH = 70, PRICK_HEIGHT = 26, PRICK_GAP = 7;
let pricks = [], ball =null,paddle =null, particles = []
let score = 0, lives =3, gameRunning = false, animationId =null

function createPricks(rows) {
pricks = [];
const cols = Math.floor((canvas.width - 40) / (PRICK_WIDTH + PRICK_GAP));
const colors = ["#FF6B6B", "#FFD93D", "#6BCB77", "#4D96FF"];

for (let r = 0; r < rows; r++) {  
    for (let c = 0; c < cols; c++) {  
        pricks.push({  
            x: 40 + c * (PRICK_WIDTH + PRICK_GAP),  
            y: 80 + r * (PRICK_HEIGHT + PRICK_GAP),  
            w: PRICK_WIDTH,  
            h: PRICK_HEIGHT,  
            color: colors[r % colors.length],  
            hit: false  
        });  
    }  
}  

leftEl.textContent = pricks.length;

}

function gameOver() {
  gameRunning = false;
  messageEl.innerHTML =
    `<strong>اللعب انتهت يا نوب!</strong><br>Final Score: ${score}`;
}

function win() {
  gameRunning = false;
  messageEl.innerHTML =
    `<strong>مبروك!</strong><br>انت حطمتكل الطوب!${ score}`;
}

function resetpaddle () {
paddle={
  x: canvas.width/2-PADDLE_WIDTH/2,
  y: canvas.height -40,
  h: PADDLE_HEIGHT,
  w :PADDLE_WIDTH,
  speed: 8
}
}
function resetBall() {
    ball = {
        x: canvas.width / 2,
        y: canvas.height - 100,
        radius: BALL_RADIUS,
        vx: (Math.random() > 0.5 ? 1 : -1) * Number(document.getElementById('ballspeed').value),
        vy: -Number(document.getElementById('ballspeed').value),
        color: '#ffffff'
    };
}

function spawnParticles(x, y, color) {
    for (let i = 0; i < 16; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 4;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 30 + Math.random() * 20,
          color})}}
function startGame()
{
    if (gameRunning) return;
    score = 0; lives = 3;
    scoreEl.textContent = '0';
    livesEl.textContent = '3';
    messageEl.textContent = 'Go! Destroy all pricks!';
    createPricks(document.getElementById('prickRows').value);
    resetBall();
    resetpaddle();
    gameRunning = true;
    if (animationId) cancelAnimationFrame(animationId);
    animationId = requestAnimationFrame(loop); 
}
function loop() {
    ctx.fillStyle = "#071526";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
 particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;

        ctx.globalAlpha = p.life / 40;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
        return p.life > 0;
    }); ctx.globalAlpha = 1;
    

    if (!gameRunning) return;
    ball.x += ball.vx
    ball.y += ball.vy
    if (ball.x - ball.radius <= 0 || ball.x + ball.radius >= canvas.width)
    ball.vx = -ball.vx;

    if (ball.y - ball.radius <= 0)
    ball.vy = -ball.vy;
    if (ball.y + ball.radius >= paddle.y
    && ball.y - ball.radius <= paddle.y + paddle.h
    && ball.x >= paddle.x
    && ball.x <= paddle.x + paddle.w
  ) {
    ball.vy = -Math.abs(ball.vy);
    const hitPos = (ball.x - paddle.x) / paddle.w;
    ball.vx = 8 * (hitPos - 0.5);
}

if (ball.y - ball.radius > canvas.height) {
    lives--;
    livesEl.textContent = lives;
    if (lives <= 0) gameOver();
    else {
        resetBall();
        messageEl.textContent =
        `Careful! ${lives} ${lives === 1 ? "life" : "lives"} left`;
    }
}

for (let i = pricks.length - 1; i >= 0; i--) {
    const b = pricks[i];
    if (!b.hit &&
        ball.x > b.x && ball.x < b.x + b.w &&
        ball.y > b.y && ball.y < b.y + b.h) {

        b.hit = true;
        pricks.splice(i, 1);
        score += 10;
        scoreEl.textContent = score;
        leftEl.textContent = pricks.length;
        spawnParticles(ball.x, ball.y, b.color);
        ball.vy = -ball.vy;
        if (pricks.length === 0) win();
    }
}

pricks.forEach(b => {
    if (!b.hit) {
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x,b.y,b.w,b.h)
    }
})
{
ctx.fillStyle = '#22c1c3';
ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

ctx.beginPath();
ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
ctx.fillStyle = '#fff';
ctx.fill();

animationId = requestAnimationFrame(loop);
}
}
const keys = {};

window.addEventListener('keydown', e => { keys[e.key] = true; });
window.addEventListener('keyup', e => { keys[e.key] = false; });

function updatePaddle() {
  if (keys['ArrowLeft']) paddle.x -= paddle.speed;
  if (keys['ArrowRight']) paddle.x += paddle.speed;
  paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));
}

const originalLoop = loop;
loop = () => {
  updatePaddle();
  originalLoop();
};

startBtn.onclick = startGame;
resetBtn.onclick = () => { location.reload(); };

messageEl.textContent = 'اضغط "Start Game" to begin!';

console.log(keys);

canvas.addEventListener('mousemove', e => {
  if (!gameRunning) return;
  const rect = canvas.getBoundingClientRect();
  paddle.x = e.clientX - rect.left - paddle.w / 2;
  paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));
});

})();
  
</script>            
    </body>
</html>
